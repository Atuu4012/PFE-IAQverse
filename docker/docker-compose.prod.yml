services:
  # Base de données InfluxDB (Données persistantes)
  influxdb:
    image: influxdb:2.7
    container_name: iaqverse-influxdb
    restart: always
    volumes:
      - influxdb_data:/var/lib/influxdb2
    env_file:
      - .env.prod
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    networks:
      - iaqverse-internal

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: iaqverse-backend
    restart: always
    volumes:
      # Partage des modèles entraînés (MLflow/Scheduler -> Backend)
      - ml_models:/app/assets/ml_models
      # Accès aux artifacts MLflow
      - mlflow_data:/mlflow
    environment:
      - INFLUXDB_ENABLED=true
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - WEBSOCKET_ENABLED=true
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - influxdb
      - mlflow
    networks:
      - iaqverse-internal

  # MLflow Server - Interface de gestion des modèles
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.8.1
    container_name: iaqverse-mlflow
    restart: always
    ports:
      # Port exposé pour accès admin (à protéger via Firewall/VPN idéalement)
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_HOST=0.0.0.0
    # Commande modifiée pour utiliser la DB dans le volume
    command: mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --serve-artifacts --allowed-hosts "*"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - iaqverse-internal

  # ML Scheduler - Réentraînement automatique
  ml-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml-scheduler
    container_name: iaqverse-ml-scheduler
    restart: always
    volumes:
      # Sauvegarde des nouveaux modèles entraînés ici
      - ml_models:/app/assets/ml_models
      # Enseignement des metrics à MLflow
      - mlflow_data:/mlflow
    environment:
      - RETRAIN_INTERVAL=${RETRAIN_INTERVAL}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
    depends_on:
      - backend
      - mlflow
    networks:
      - iaqverse-internal

  # Frontend Nginx - Serveur Web Principal
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: iaqverse-frontend
    restart: always
    ports:
      # Port 80 standard pour le web
      - "80:80"
    depends_on:
      - backend
    networks:
      - iaqverse-internal

# Volumes persistants (Docker gère le stockage physique sur le VPS)
volumes:
  influxdb_data:
  mlflow_data:
  ml_models:

networks:
  iaqverse-internal:
    driver: bridge