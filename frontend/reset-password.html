<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation mot de passe - IAQverse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/theme.js"></script>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .reset-card { background: var(--bg-secondary); padding: 40px; border-radius: 12px; box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); font-size: 16px; }
        .btn-reset { background: var(--accent-color); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn-reset:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>Nouveau mot de passe</h1>
        <form id="reset-form">
            <div class="form-group">
                <label for="new_password">Mot de passe</label>
                <input type="password" id="new_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-reset">Mettre à jour</button>
        </form>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Au chargement, supabase détecte l'event PASSWORD_RECOVERY
             // auth.js doit initialiser supabaseClient
        });
        
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const client = await initSupabase(); // Assurez-vous que cette fonction est exportée ou globale
            
            const { data, error } = await client.auth.updateUser({ password: newPassword });
            
            if (error) alert("Erreur: " + error.message);
            else {
                alert("Mot de passe mis à jour !");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
