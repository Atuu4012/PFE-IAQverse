<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation mot de passe - IAQverse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/auth.js" defer></script>
    <script src="js/config-loader.js" defer></script>
    <script src="js/theme.js" defer></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
            background-color: #f0f4f8;
        }

        .login-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Changement pour un fond Forêt pour le reset password */
            background: url('https://images.unsplash.com/photo-1448375240586-dfd8d395ea6c?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            filter: brightness(0.9);
            animation: breathe 25s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }

        .reset-card { 
            /* Force Light Mode colors inside the card */
            --text-primary: #2c3e50;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --bg-primary: #ffffff;

            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.8s ease-out;
            color: var(--text-primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); font-size: 16px; }
        .btn-reset { background: var(--accent-color); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn-reset:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <!-- Background dynamique -->
    <div class="login-bg"></div>

    <div class="reset-card">
        <h1>Nouveau mot de passe</h1>
        <form id="reset-form">
            <div class="form-group">
                <label for="new_password">Mot de passe</label>
                <input type="password" id="new_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-reset">Mettre à jour</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Au chargement, supabase détecte l'event PASSWORD_RECOVERY
             // auth.js doit initialiser supabaseClient
        });
        
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const client = await initSupabase(); // Assurez-vous que cette fonction est exportée ou globale
            
            const { data, error } = await client.auth.updateUser({ password: newPassword });
            
            if (error) alert("Erreur: " + error.message);
            else {
                alert("Mot de passe mis à jour !");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
