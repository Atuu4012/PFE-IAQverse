services:
  # InfluxDB - Time series database
  influxdb:
    image: influxdb:2.7
    container_name: iaqverse-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ../database/influx_data:/var/lib/influxdb2
    env_file:
      - .env.dev
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    networks:
      - iaqverse-network

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: iaqverse-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../assets:/app/assets
      - ../database:/app/database
    env_file:
      - .env.dev
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - influxdb
      - mlflow
    networks:
      - iaqverse-network

  # MLflow - Model Registry & Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.8.1
    container_name: iaqverse-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Stockage des métriques dans un fichier local SQLite pour la simplicité
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_HOST=0.0.0.0
    # Sécurité (v3+) : On autorise "*" pour le réseau Docker
    command: mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --serve-artifacts --allowed-hosts "*"
    volumes:
      - ../backend/dl/mlflow_data:/mlflow
    networks:
      - iaqverse-network

  # Frontend (optional - can also be served separately)
  frontend:
    image: nginx:alpine
    container_name: iaqverse-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/usr/share/nginx/html
      - ../assets:/usr/share/nginx/html/assets
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - iaqverse-network

  # ML Scheduler - Réentraînement périodique
  ml-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml-scheduler
    container_name: iaqverse-ml-scheduler
    restart: unless-stopped
    volumes:
      - ../assets/ml_models:/app/assets/ml_models
      - ../assets/datasets:/app/assets/datasets
      - ../backend/ml:/app/backend/ml
      - ../backend/dl:/app/backend/dl
      # Montage nécessaire pour partager les artifacts MLflow (Mode Local)
      - ../backend/dl/mlflow_data:/mlflow
    environment:
      - RETRAIN_INTERVAL=${RETRAIN_INTERVAL}
      - INFLUXDB_ENABLED=${INFLUXDB_ENABLED}
      - API_URL=http://backend:8000/api/iaq/data?hours=72
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - backend
      - influxdb
      - mlflow
    networks:
      - iaqverse-network

networks:
  iaqverse-network:
    driver: bridge

volumes:
  influx_data:
