name: Deploy to VPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest-playwright
          playwright install --with-deps chromium

      - name: Run Backend Tests
        run: |
          # Set PYTHONPATH to include the root directory
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/backend

      - name: Run Frontend Tests
        run: |
          # Start a simple HTTP server to serve the frontend for testing
          python -m http.server 8000 &
          PID=$!
          sleep 3 # Wait for server to start
          pytest tests/frontend
          kill $PID

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # On ajoute 'debug: true' pour voir les logs en cas d'erreur SSH
          debug: true
          script: |
            # 1. Aller dans le dossier du projet
            cd /home/ubuntu/prod/PFE-IAQverse

            # 2. Récupérer le dernier code
            git pull origin main --ff-only

            # 3. Lancer la production avec le bon fichier
            # On utilise explicitement le fichier de PROD
            docker compose -f docker/docker-compose.prod.yml --env-file .env.prod up -d --build --remove-orphans

            # 4. Nettoyer les vieilles images
            docker image prune -f
