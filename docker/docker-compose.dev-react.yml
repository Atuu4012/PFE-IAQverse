# Docker Compose pour Développement React
# Ce fichier est optimisé pour le développement avec hot-reload

services:
  # InfluxDB - Time series database
  influxdb:
    image: influxdb:2.7
    container_name: iaqverse-influxdb-dev
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ../database/influx_data:/var/lib/influxdb2
    env_file:
      - ../.env
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-iaqverse}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-iaq_data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-iaqverse-secret-token}
    networks:
      - iaqverse-network

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: iaqverse-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../assets:/app/assets
      - ../database:/app/database
    environment:
      - INFLUXDB_ENABLED=${INFLUXDB_ENABLED}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-iaqverse}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-iaq_data}
      - WEBSOCKET_ENABLED=${WEBSOCKET_ENABLED:-true}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - influxdb
    networks:
      - iaqverse-network

  # MLflow - Model Registry & Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.8.1
    container_name: iaqverse-mlflow-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_HOST=0.0.0.0
    command: mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --serve-artifacts --allowed-hosts "*"
    volumes:
      - ../backend/dl/mlflow_data:/mlflow
    networks:
      - iaqverse-network

  # Frontend React (Développement avec Vite + Hot Reload)
  frontend-react:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend-react
    container_name: iaqverse-frontend-react-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Volume pour le hot-reload - monte tout le code source
      - ../frontend-react/src:/app/src
      - ../frontend-react/public:/app/public
      - ../frontend-react/index.html:/app/index.html
      - ../frontend-react/vite.config.js:/app/vite.config.js
      - ../frontend-react/package.json:/app/package.json
      # Exclure node_modules pour éviter les conflits
      - /app/node_modules
      # Assets partagés
      - ../assets:/app/public/assets
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_KEY}
    depends_on:
      - backend
    networks:
      - iaqverse-network
    stdin_open: true
    tty: true

networks:
  iaqverse-network:
    driver: bridge

volumes:
  influx_data:
